<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>상품 등록</title>
    <style>
        .form-container {
            width: 300px;
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-submit {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-submit:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <h2>상품 정보 등록</h2>

    <div class="form-container">
        <!-- 데이터를 폼 전송을 통해 ProductController 의 /productInsert 매핑으로 전달합니다. -->
        <form action="/product/productInsert" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="name">상품명</label>
                <input type="text" id="name" name="name" required placeholder="상품명을 입력하세요">
            </div>

            <div class="form-group">
                <label for="price">가격 (원)</label>
                <input type="number" id="price" name="price" required placeholder="가격을 입력하세요" min="0">
            </div>

            <div class="form-group">
                <label for="amount">수량</label>
                <input type="number" id="amount" name="amount" required placeholder="수량을 입력하세요" min="1">
            </div>

            <div class="form-group">
                <label for="file">상품 이미지 </label>
                <input type="file" id="file" name="file">
            </div>
            <hr>
            <button type="submit" class="btn-submit">등록하기</button>
            <a th:href="@{/product/list}">목록으로</a>
        </form>
    </div>

    <br>
    <a href="/product/list">목록으로 돌아가기</a>

</body>

</html>
