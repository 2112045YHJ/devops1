<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>상품 상세 정보</title>
    <style>
        .detail-container {
            width: 400px;
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
            font-family: sans-serif;
        }

        .detail-row {
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: bold;
            color: #555;
            display: inline-block;
            width: 100px;
        }

        .detail-value {
            color: #333;
        }

        .btn-back {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background-color: #008CBA;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        .btn-back:hover {
            background-color: #007bb5;
        }
    </style>
</head>

<body>

    <h2>상품 상세 정보</h2>

    <div class="detail-container" th:if="${product != null}">
        <div class="detail-row" th:if="${product.storedFilePath != null}">
            <span class="detail-label">상품 이미지:</span>
            <span class="detail-value">
                <img th:src="${product.storedFilePath}" width="200" height="auto" />
            </span>
        </div>
        <div class="detail-row">
            <span class="detail-label">상품 번호:</span>
            <span class="detail-value" th:text="${product.num}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">상품명:</span>
            <span class="detail-value" th:text="${product.name}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">가격:</span>
            <span class="detail-value" th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + ' 원'"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">수량:</span>
            <span class="detail-value" th:text="${product.amount}"></span>
        </div>
    </div>

    <div th:if="${product == null}">
        <p>해당 상품 정보를 찾을 수 없습니다.</p>
    </div>

    <div style="margin-top: 20px;">
        <a th:if="${product != null}" th:href="@{/product/modify(num=${product.num})}" class="btn-back"
            style="background-color: #4CAF50;">수정</a>
        <form th:if="${product != null}" th:action="@{/product/delete}" method="get" style="display:inline;">
            <input type="hidden" name="num" th:value="${product.num}" />
            <button type="submit" class="btn-back"
                style="background-color: #f44336; border: none; cursor: pointer; font-size: 16px; font-family: sans-serif;"
                onclick="return confirm('정말 삭제하시겠습니까?');">삭제</button>
        </form>
        <a href="/product/list" class="btn-back">목록으로 돌아가기</a>
    </div>

</body>

</html>
